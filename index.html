<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyTeamLN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

  <section class="container-fluid bg-dark d-flex flex-column align-items-center justify-content-between p-3 gap-3 hero"
    id="hero">
    <div class="text-center">
      <h1 class="display-1 pt-5 hero-title">FutLourdão</h1>
      <p class="lead m-0 hero-text">Seu time começa aqui!!!</p>
    </div>
    <div class="grid-bg">
      <div class="grid" id="grid"></div>
    </div>
  </section>

  <!-- cards com os jogadores -->
  <main class="container-fluid container-cards">

    <h2 class="text-light py-5 px-3">Clique no Jogador</h2>
    <section class="grid-cards row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4" id="grid-cards">
    </section>

    <h4 class="text-light my-4 pb-4">Total de Jogadores encontrados: <span id="totJogador"></span></h4>

  </main>










  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <!-- linkar o app.js como um module -->
  <script type="module" src="./js/app.js"></script>
</body>

</html>
